# Configurations here will be applied after app.conf, and before any ADDITIONAL_CONFIG env vars
# Please use this file for temporary changes that require quick iterations. Once made permanent,
# please upstream the change to the Canton repo.

# TODO(DACH-NY/canton-network-internal#4997) Remove once ACS commitment processor shutdown is quick.
canton.parameters.timeouts.processing.shutdown-processing = 10m

canton.participants.participant {
    parameters {
      commitment-asynchronous-initialization = true
      # Query the DB instead of the topology cache for commitment queries
      # which just makes things worse and overloads the node.
      commitment-use-db-snapshot-for-participant-lookup = true
    }
    topology {
        enable-topology-state-cache-consistency-checks = false
        use-new-processor = true
        use-new-client = true
    }
}
