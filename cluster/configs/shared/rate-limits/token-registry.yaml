rateLimits:
  /registry/allocations/v1:
    name: registry-allocations
    type: limited
    maxTokens: 200
    tokensPerFill: 200
    fillInterval: 60s
    perIpLimits:
      maxTokens: 30
      tokensPerFill: 30
      fillInterval: 60s
  /registry/metadata/v1/info:
    name: registry-metadata-info
    type: limited
    maxTokens: 200
    tokensPerFill: 200
    fillInterval: 60s
    perIpLimits:
      maxTokens: 30
      tokensPerFill: 30
      fillInterval: 60s
  /registry/metadata/v1/instruments:
    name: registry-metadata-instruments
    type: limited
    maxTokens: 200
    tokensPerFill: 200
    fillInterval: 60s
    perIpLimits:
      maxTokens: 30
      tokensPerFill: 30
      fillInterval: 60s
  /registry/allocation-instruction/v1/allocation-factory:
