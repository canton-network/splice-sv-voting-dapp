    type: limited
    maxTokens: 200
    tokensPerFill: 200
    fillInterval: 60s
    perIpLimits:
      maxTokens: 30
      tokensPerFill: 30
      fillInterval: 60s
  /registry/transfer-instruction/v1/transfer-factory:
    name: registry-transfer-factory
    type: limited
    maxTokens: 500
    tokensPerFill: 500 # Higher limit: transfer-factory generates the most registry traffic
