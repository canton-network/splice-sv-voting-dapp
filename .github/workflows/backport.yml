name: Backport a commit or PR across branches
on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'A commit SHA to backport (either commit_sha or pr_number must be provided)'
        required: false
        type: string
      pr_number:
        description: 'A merged PR to backport (either commit_sha or pr_number must be provided)'
        required: false
        type: number
      base_branch:
        description: 'The branch to backport to'
        required: true
        type: string
      reviewer:
        description: 'The GitHub username of a reviewer to request a review from (currently supports only one reviewer)'
        required: false
        type: string

jobs:
  backport:
    uses: canton-network/splice-shared-gha/.github/workflows/backport.yml@0b9a39ef49840763de8813c8b259dc2e9cc0c919
    with:
      commit_sha: ${{ inputs.commit_sha }}
      pr_number: ${{ fromJSON(inputs.pr_number) }}
      base_branch: ${{ inputs.base_branch }}
      reviewer: ${{ inputs.reviewer }}
    secrets:
      strong_token: ${{ secrets.GH_CREATE_PRS_TOKEN }}
